<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> คำนวณกำไร ขาดทุน</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e0b;
    --surface: #121a14;
    --surface2: #1a2420;
    --border: #243028;
    --accent: #22c55e;
    --accent-dim: #15803d;
    --accent-glow: rgba(34,197,94,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --text: #e8f0ea;
    --muted: #6b8c73;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans Thai', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(34,197,94,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }

  .wrap { width: 100%; max-width: 680px; }

  /* Header */
  .header { margin-bottom: 2.5rem; }
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 0.75rem;
    background: var(--accent-glow);
  }
  h1 {
    font-family: var(--mono);
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 0.5rem;
    font-weight: 300;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }

  /* Inputs */
  .inputs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 480px) { .inputs-grid { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.05rem;
    font-weight: 500;
    padding: 0.6rem 0.8rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .field input::-webkit-outer-spin-button,
  .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input:focus, .field select:focus {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field select option { background: #1a2420; }

  .acct-span { grid-column: 1 / -1; }

  /* Calculate button */
  .calc-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.85rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #0a0e0b;
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .calc-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .calc-btn:hover { background: #4ade80; }
  .calc-btn:hover::after { transform: translateX(100%); }
  .calc-btn:active { transform: scale(0.98); }

  /* Result section */
  #result { display: none; }

  /* Big number */
  .result-hero {
    text-align: center;
    padding: 2rem 1rem;
  }
  .result-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }
  .result-amount {
    font-family: var(--mono);
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .result-pct {
    font-family: var(--mono);
    font-size: 1rem;
    margin-top: 0.5rem;
    opacity: 0.7;
  }

  .profit .result-tag { color: var(--accent); }
  .profit .result-amount { color: var(--accent); }
  .profit .result-pct { color: var(--accent); }

  .loss .result-tag { color: var(--red); }
  .loss .result-amount { color: var(--red); }
  .loss .result-pct { color: var(--red); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .stat {
    background: var(--surface2);
    padding: 0.9rem 0.75rem;
    text-align: center;
  }
  .stat-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
  }

  /* Fee breakdown table */
  .fee-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .fee-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  @media (max-width: 480px) { .fee-cols { grid-template-columns: 1fr; } }

  .fee-table { width: 100%; border-collapse: collapse; }
  .fee-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0 0 0.5rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .fee-table td {
    font-family: var(--mono);
    font-size: 12px;
    padding: 0.35rem 0;
    border-bottom: 1px solid rgba(36,48,40,0.6);
    vertical-align: middle;
  }
  .fee-table td:last-child { text-align: right; color: var(--muted); }
  .fee-table tr:last-child td { border-bottom: none; font-weight: 600; color: var(--text); }
  .fee-table tr:last-child td:last-child { color: var(--text); }
  .fee-label { color: var(--text); font-size: 11px; }
  .fee-side {
    font-size: 9px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .fee-buy .fee-side { color: #60a5fa; }
  .fee-sell .fee-side { color: #f97316; }

  /* Summary row at bottom */
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .key { color: var(--muted); font-weight: 300; }
  .summary-row .val { font-family: var(--mono); font-weight: 500; }

  /* Footer */
  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeUp 0.35s ease forwards; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>หุ้น<span>ไทย</span><br>คำนวณกำไร ขาดทุน</h1>
    <p class="subtitle">ผ่าน ธ.กสิกรไทย (KS Trade+) · รวมค่าธรรมเนียมทุกรายการ</p>
	<a href="about.html" style="color: white; background-color: red; padding: 4px 10px; text-decoration: none; border-radius: 4px;">คำนวณราคาเฉลี่ยพอร์ต</a>
  </div>

  <div class="card">
    <div class="card-title">// ข้อมูลการซื้อขาย</div>
    <div class="inputs-grid">
      <div class="field">
        <label>ราคาซื้อ (บาท/หน่วย)</label>
        <input type="number" id="buyPrice" value="4.70" step="0.01" min="0.01">
      </div>
      <div class="field">
        <label>ราคาขาย (บาท/หน่วย)</label>
        <input type="number" id="sellPrice" value="4.80" step="0.01" min="0.01">
      </div>
      <div class="field">
        <label>จำนวนหน่วย</label>
        <input type="number" id="qty" value="120" step="1" min="1">
      </div>
      <div class="field">
        <label>ประเภทบัญชี</label>
        <select id="acctType">
          <option value="0.15">Cash Balance · 0.15%</option>
          <option value="0.20">Cash Account · 0.20%</option>
          <option value="0.25">ผ่านเจ้าหน้าที่ · 0.25%</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">CALCULATE</button>
  </div>

  <div id="result">

    <div class="card anim" id="heroCard">
      <div class="result-hero" id="heroInner">
      </div>
    </div>

    <div class="stats-row anim" id="statsRow"></div>

    <div class="card anim" id="feeCard">
      <div class="fee-title">// ค่าธรรมเนียมแยกตามรายการ</div>
      <div class="fee-cols" id="feeCols"></div>
    </div>

    <div class="card anim" id="summaryCard">
      <div class="fee-title">// สรุปรวม</div>
      <div id="summaryRows"></div>
    </div>

  </div>

  <div class="footer">
    อัตราค่าธรรมเนียม KS · ข้อมูลเพื่อประกอบการตัดสินใจเท่านั้น<br>
  </div>

</div>

<script>
function fmt(n, d = 2) { return parseFloat(n).toFixed(d); }
function fmtComma(n) { return parseFloat(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function calcFees(val, commRate) {
  const comm   = val * (commRate / 100);
  const setF   = val * 0.005 / 100;
  const clrF   = val * 0.001 / 100;
  const regF   = val * 0.001 / 100;
  const sub    = comm + setF + clrF + regF;
  const vatAmt = sub * 0.07;
  return { comm, setF, clrF, regF, vatAmt, total: sub + vatAmt };
}

function feeTable(fees, commRate, side) {
  const colorClass = side === 'ซื้อ' ? 'fee-buy' : 'fee-sell';
  return `
    <div class="${colorClass}">
      <div class="fee-side">${side === 'ซื้อ' ? '▲ ' : '▼ '}ฝั่ง${side}</div>
      <table class="fee-table">
        <tr><th>รายการ</th><th>จำนวน</th></tr>
        <tr><td class="fee-label">ค่าคอม (${commRate}%)</td><td>${fmt(fees.comm, 4)}</td></tr>
        <tr><td class="fee-label">SET Fee (0.005%)</td><td>${fmt(fees.setF, 4)}</td></tr>
        <tr><td class="fee-label">Clearing (0.001%)</td><td>${fmt(fees.clrF, 4)}</td></tr>
        <tr><td class="fee-label">Regulatory (0.001%)</td><td>${fmt(fees.regF, 4)}</td></tr>
        <tr><td class="fee-label">VAT 7%</td><td>${fmt(fees.vatAmt, 4)}</td></tr>
        <tr><td class="fee-label">รวม</td><td>${fmt(fees.total, 4)}</td></tr>
      </table>
    </div>`;
}

function calculate() {
  const buy      = parseFloat(document.getElementById('buyPrice').value) || 4.70;
  const sell     = parseFloat(document.getElementById('sellPrice').value) || 4.80;
  const qty      = parseInt(document.getElementById('qty').value) || 120;
  const commRate = parseFloat(document.getElementById('acctType').value);

  const buyVal   = buy * qty;
  const sellVal  = sell * qty;
  const buyFees  = calcFees(buyVal, commRate);
  const sellFees = calcFees(sellVal, commRate);

  const totalCost     = buyVal + buyFees.total;
  const totalReceived = sellVal - sellFees.total;
  const profit        = totalReceived - totalCost;
  const profitPct     = (profit / totalCost * 100);
  const isProfit      = profit >= 0;
  const sign          = isProfit ? '+' : '';
  const cls           = isProfit ? 'profit' : 'loss';
  const label         = isProfit ? 'กำไรสุทธิ' : 'ขาดทุนสุทธิ';

  document.getElementById('result').style.display = 'block';

  document.getElementById('heroInner').innerHTML = `
    <div class="result-tag">${label}</div>
    <div class="result-amount ${cls}">${sign}${fmtComma(profit)}</div>
    <div class="result-pct ${cls}">${sign}${fmt(profitPct, 3)}% จากต้นทุน</div>
  `;
  document.getElementById('heroCard').className = 'card anim';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-lbl">มูลค่าซื้อ</div><div class="stat-val">${fmtComma(buyVal)}</div></div>
    <div class="stat"><div class="stat-lbl">มูลค่าขาย</div><div class="stat-val">${fmtComma(sellVal)}</div></div>
    <div class="stat"><div class="stat-lbl">ส่วนต่างดิบ</div><div class="stat-val">${sign}${fmtComma(sellVal - buyVal)}</div></div>
  `;

  document.getElementById('feeCols').innerHTML =
    feeTable(buyFees, commRate, 'ซื้อ') +
    feeTable(sellFees, commRate, 'ขาย');

  const totalFees = buyFees.total + sellFees.total;
  document.getElementById('summaryRows').innerHTML = `
    <div class="summary-row"><span class="key">ต้นทุนรวม (ซื้อ + ค่าฟี)</span><span class="val">${fmtComma(totalCost)} บ.</span></div>
    <div class="summary-row"><span class="key">รับสุทธิ (ขาย − ค่าฟี)</span><span class="val">${fmtComma(totalReceived)} บ.</span></div>
    <div class="summary-row"><span class="key">ค่าธรรมเนียมรวมทั้งหมด</span><span class="val">${fmt(totalFees, 4)} บ.</span></div>
    <div class="summary-row"><span class="key" style="font-weight:500;color:var(--text)">${label}</span><span class="val" style="color:${isProfit ? 'var(--accent)' : 'var(--red)'}">${sign}${fmtComma(profit)} บ.</span></div>
  `;

  setTimeout(() => {
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}
</script>
</body>
</html>
